{% extends "base.html" %}

{% block title %}Reset Password – TankApp{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">Reset Password</h1>

    {% if error %}
    <div class="bg-red-50 text-red-800 border border-red-200 rounded-md p-4 mb-4">
        <p class="text-sm">{{ error }}</p>
    </div>
    {% endif %}

    {% if token %}
    <form method="post" action="/reset-password/{{ token }}" class="space-y-4">
        <div>
            <label for="new_password" class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
            <input type="password" id="new_password" name="new_password" required
                   class="w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-green-500 focus:ring-1 focus:ring-green-500">
        </div>
        <div>
            <label for="new_password_confirm" class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
            <input type="password" id="new_password_confirm" name="new_password_confirm" required
                   class="w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-green-500 focus:ring-1 focus:ring-green-500">
        </div>
        <button type="submit" class="w-full bg-green-600 text-white py-2 px-4 rounded-md hover:bg-green-700 transition font-medium">
            Reset Password
        </button>
    </form>
    {% endif %}

    <p class="mt-4 text-sm text-gray-600 text-center">
        <a href="/login" class="text-green-600 hover:text-green-700">Back to login</a>
    </p>
</div>
{% endblock %}
